<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Medidor Inercial 3D PWA - Edición</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #121212;
      color: #fff;
      user-select: none;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }
    #metrics {
      pointer-events: auto;
      padding: 12px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: space-around;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .metric { text-align: center; }
    .metric span { display: block; font-size: 1.1rem; font-weight: bold; color: #4caf50; }
    
    /* Panel flotante de selección de punto */
    #selection-card {
      pointer-events: auto;
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(33, 33, 33, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #ff9800;
      padding: 12px 20px;
      border-radius: 8px;
      display: none; /* Oculto por defecto */
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #selection-card span { font-weight: bold; color: #ff9800; }
    
    #controls {
      pointer-events: auto;
      padding: 16px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    .btn-sim { background: #2196f3; color: #fff; }
    .btn-close { background: #4caf50; color: #fff; }
    .btn-delete { background: #e91e63; color: #fff; }
    .btn-cancel { background: #666; color: #fff; }
    .btn-clear { background: #f44336; color: #fff; }
    button:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
    #canvas3d { width: 100vw; height: 100vh; display: block; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="ui-container">
    <div id="metrics">
      <div class="metric">Puntos: <span id="lbl-pts">0</span></div>
      <div class="metric">Perímetro: <span id="lbl-per">0.00 m</span></div>
      <div class="metric">Área (2D): <span id="lbl-area">-- m²</span></div>
    </div>

    <!-- Menú contextual al seleccionar un punto -->
    <div id="selection-card">
      <span id="lbl-selected-info">Punto #1 seleccionado</span>
      <div style="display: flex; gap: 8px;">
        <button class="btn-delete" id="btnDeletePoint">Borrar Punto</button>
        <button class="btn-cancel" id="btnDeselectPoint">Cancelar</button>
      </div>
    </div>

    <div id="controls">
      <button class="btn-sim" id="btnAdd">+ Añadir Punto 3D</button>
      <button class="btn-close" id="btnClose" disabled>Cerrar Plano</button>
      <button class="btn-clear" id="btnClear">Limpiar</button>
    </div>
  </div>

  <canvas id="canvas3d"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- ESTADO Y VARIABLES GLOBALES ---
    const points = [];
    let selectedIndex = -1; // Índice del punto seleccionado (-1 = ninguno)
    let isClosed = false;

    // Raycasting para detección de clics/toques en objetos 3D
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // --- CONFIGURACIÓN DE TRES.JS ---
    const canvas = document.getElementById('canvas3d');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 8, 10);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
    scene.add(gridHelper);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const lineGroup = new THREE.Group();
    const nodeGroup = new THREE.Group();
    let meshSurface = null;
    scene.add(lineGroup);
    scene.add(nodeGroup);

    // --- DIBUJADO DE LA ESCENA 3D ---
    function update3DScene() {
      lineGroup.clear();
      nodeGroup.clear();
      if (meshSurface) {
        scene.remove(meshSurface);
        meshSurface.geometry.dispose();
        meshSurface.material.dispose();
        meshSurface = null;
      }

      if (points.length === 0) return;

      // 1. DIBUJAR PUNTOS / NODOS
      const sphereGeo = new THREE.SphereGeometry(0.12, 16, 16);
      points.forEach((p, index) => {
        let color = 0x2196f3; // Azul estándar
        let scale = 1.0;

        if (index === selectedIndex) {
          color = 0xff9800; // Naranja (Seleccionado)
          scale = 1.5;      // Más grande para destacar
        } else if (index === 0) {
          color = 0xf44336; // Rojo (Origen)
        }

        const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3 });
        const sphere = new THREE.Mesh(sphereGeo, mat);
        sphere.position.copy(p);
        sphere.scale.setScalar(scale);
        
        // Guardamos el índice dentro del objeto para identificarlo en el Raycaster
        sphere.userData = { pointIndex: index }; 
        nodeGroup.add(sphere);
      });

      // 2. DIBUJAR LÍNEAS DE UNIÓN
      if (points.length > 1) {
        const linePoints = [...points];
        if (isClosed) linePoints.push(points[0]);

        const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
        const lineMat = new THREE.LineBasicMaterial({
          color: isClosed ? 0x4caf50 : 0x2196f3,
          linewidth: 3
        });
        lineGroup.add(new THREE.Line(lineGeo, lineMat));
      }

      // 3. RELLENO DE PLANO
      if (isClosed && points.length >= 3) {
        const shape = new THREE.Shape();
        shape.moveTo(points[0].x, points[0].z);
        for (let i = 1; i < points.length; i++) {
          shape.lineTo(points[i].x, points[i].z);
        }

        const shapeGeo = new THREE.ShapeGeometry(shape);
        shapeGeo.rotateX(Math.PI / 2);

        const shapeMat = new THREE.MeshBasicMaterial({
          color: 0x4caf50,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.35
        });

        meshSurface = new THREE.Mesh(shapeGeo, shapeMat);
        meshSurface.position.y = 0.001;
        scene.add(meshSurface);
      }
    }

    // --- DETECCIÓN DE CLIC Y SELECCIÓN (RAYCASTING) ---
    function onPointerDown(event) {
      // Ignorar clics sobre botones e interfaz superior
      if (event.target.tagName === 'BUTTON' || event.target.closest('#metrics')) return;

      // Convertir la coordenada del toque/clic a coordenadas normalizadas (-1 a +1)
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      // Evaluamos colisión con los nodos (esferas)
      const intersects = raycaster.intersectObjects(nodeGroup.children);

      if (intersects.length > 0) {
        // Obtenemos el índice del punto pulsado
        const hitObject = intersects[0].object;
        selectedIndex = hitObject.userData.pointIndex;
        
        showSelectionCard(true);
      } else {
        // Si se pulsa en el espacio vacío, deseleccionamos
        selectedIndex = -1;
        showSelectionCard(false);
      }

      update3DScene();
    }
    window.addEventListener('pointerdown', onPointerDown);

    function showSelectionCard(visible) {
      const card = document.getElementById('selection-card');
      if (visible && selectedIndex !== -1) {
        document.getElementById('lbl-selected-info').innerText = `Punto #${selectedIndex + 1} seleccionado`;
        card.style.display = 'flex';
      } else {
        card.style.display = 'none';
      }
    }

    // --- LÓGICA DE BORRADO DE PUNTOS ---
    document.getElementById('btnDeletePoint').addEventListener('click', () => {
      if (selectedIndex === -1) return;

      // Se elimina el punto seleccionado del arreglo
      // JavaScript une automáticamente los puntos contiguos restante (i-1 con i+1)
      points.splice(selectedIndex, 1);
      
      selectedIndex = -1;
      showSelectionCard(false);

      // Si quedan menos de 3 puntos, el plano ya no puede permanecer cerrado
      if (points.length < 3) {
        isClosed = false;
      }

      updateMetrics();
      update3DScene();
    });

    document.getElementById('btnDeselectPoint').addEventListener('click', () => {
      selectedIndex = -1;
      showSelectionCard(false);
      update3DScene();
    });

    // --- MÉTRICAS Y EVENTOS ESTÁNDAR ---
    function updateMetrics() {
      document.getElementById('lbl-pts').innerText = points.length;
      document.getElementById('btnClose').disabled = points.length < 3 || isClosed;

      let perimeter = 0;
      for (let i = 1; i < points.length; i++) {
        perimeter += points[i].distanceTo(points[i - 1]);
      }
      if (isClosed && points.length > 2) {
        perimeter += points[points.length - 1].distanceTo(points[0]);
      }
      document.getElementById('lbl-per').innerText = perimeter.toFixed(2) + ' m';

      if (isClosed && points.length >= 3) {
        let area = 0;
        for (let i = 0; i < points.length; i++) {
          const p1 = points[i];
          const p2 = points[(i + 1) % points.length];
          area += (p1.x * p2.z) - (p2.x * p1.z);
        }
        document.getElementById('lbl-area').innerText = (Math.abs(area) / 2).toFixed(2) + ' m²';
      } else {
        document.getElementById('lbl-area').innerText = '-- m²';
      }
    }

    // Simulación de entrada de datos 3D
    const demoPath3D = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(4, 0, 0),
      new THREE.Vector3(4, 0.5, -3),
      new THREE.Vector3(1, 0.2, -3),
      new THREE.Vector3(0, 0, -5)
    ];
    let simIdx = 0;

    document.getElementById('btnAdd').addEventListener('click', () => {
      if (isClosed) return;

      if (simIdx < demoPath3D.length) {
        points.push(demoPath3D[simIdx++].clone());
      } else {
        const last = points[points.length - 1];
        points.push(new THREE.Vector3(
          last.x + (Math.random() - 0.3) * 2,
          last.y + (Math.random() - 0.5) * 0.3,
          last.z + (Math.random() - 0.3) * 2
        ));
      }

      updateMetrics();
      update3DScene();
    });

    document.getElementById('btnClose').addEventListener('click', () => {
      if (points.length < 3) return;
      isClosed = true;
      updateMetrics();
      update3DScene();
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      points.length = 0;
      selectedIndex = -1;
      isClosed = false;
      simIdx = 0;
      showSelectionCard(false);
      updateMetrics();
      update3DScene();
    });

    // Bucle de renderizado
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
